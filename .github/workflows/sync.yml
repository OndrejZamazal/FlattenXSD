name: Sync XSD from CCMM

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

# Povolení zápisu pro GitHub Actions token
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout destination (your repo)
        uses: actions/checkout@v4
        with:
          path: destination
          # Použije automatický token s právy zápisu
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout CCMM source
        uses: actions/checkout@v4
        with:
          repository: techlib/CCMM
          path: source

      - name: Copy XSD directories with structure
        run: |
          mkdir -p destination/mirror-ccmm
          cd source
          # Najdeme a zkopírujeme soubory
          find . -name "*.xsd" > xsd_list.txt
          if [ -s xsd_list.txt ]; then
            cat xsd_list.txt | xargs cp --parents -t ../destination/mirror-ccmm/
          fi

      - name: Commit and push
        run: |
          cd destination
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # Kontrola, zda jsou v indexu nějaké změny k odeslání
          if ! git diff --cached --quiet; then
            git commit -m "Sync XSD schemas from techlib/CCMM"
            git push origin HEAD
          else
            echo "Žádné změny k nahrání."
          fi
