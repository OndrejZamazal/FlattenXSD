name: Sync XSD from CCMM

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout destination (your repo)
        uses: actions/checkout@v4
        with:
          path: destination

      - name: Checkout CCMM source
        uses: actions/checkout@v4
        with:
          repository: techlib/CCMM
          path: source

      - name: Copy XSD directories with structure
        run: |
          # Vstup do složky zdroje
          cd source
          
          # Najdeme všechny soubory .xsd a zkopírujeme je i s cestou do cíle
          # --parents zachová adresářovou strukturu
          find . -name "*.xsd" -exec cp --parents -t ../destination/mirror-ccmm/ {} +

      - name: Commit and push
        run: |
          cd destination
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Sync XSD schemas from techlib/CCMM"
            git push
          else
            echo "No changes to commit"
          fi
