name: Sync XSD from CCMM

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout destination (your repo)
        uses: actions/checkout@v4
        with:
          path: destination

      - name: Checkout CCMM source
        uses: actions/checkout@v4
        with:
          repository: techlib/CCMM
          path: source

      - name: Copy XSD directories with structure
        run: |
          # Vytvoření cílového adresáře předem
          mkdir -p destination/mirror-ccmm
          
          # Přejdeme do zdroje
          cd source
          
          # Najdeme všechny XSD soubory. 
          # Pokud žádné nenajde, skript neselže díky '|| true'
          # Použijeme rsync, který je pro kopírování struktur spolehlivější
          find . -name "*.xsd" > xsd_list.txt
          
          if [ -s xsd_list.txt ]; then
            cat xsd_list.txt | xargs cp --parents -t ../destination/mirror-ccmm/
            echo "Soubory byly zkopírovány."
          else
            echo "Nenalezeny žádné XSD soubory."
          fi

      - name: Commit and push
        run: |
          cd destination
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Kontrola, zda je co commitovat
          if ! git diff --cached --quiet; then
            git commit -m "Sync XSD schemas from techlib/CCMM"
            git push
          else
            echo "Zádné změny k nahrání."
          fi
